<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTS Partners · Report Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#1A1A1B;--green:#3D754E;--gl:#5a9e6f;--gl2:#a3d9b1;--ow:#F9F5EF;
  --gray:#2e2e2f;--gray2:#3d3d3e;--muted:#a0a0a0;--border:rgba(255,255,255,0.08);
  --warn:#f0b429;--danger:#f87171;--info:#60a5fa;
}
body{font-family:'Ubuntu',sans-serif;background:var(--black);color:var(--ow);min-height:100vh;}

.nav{background:#111112;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:2px;overflow-x:auto;position:sticky;top:0;z-index:100;}
.nav-brand{display:flex;align-items:center;gap:10px;padding:10px 0;margin-right:1.5rem;flex-shrink:0;}
.brand-logo{width:28px;height:28px;}
.brand-name{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:.05em;line-height:1.2;}
.brand-sub{font-size:9px;color:var(--muted);letter-spacing:.06em;margin-top:1px;}
.tab{font-size:12px;font-weight:500;padding:14px 16px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--ow);}
.tab.active{color:#fff;border-bottom-color:var(--green);}

/* MONTH SELECTOR */
.month-selector{margin-left:auto;display:flex;align-items:center;gap:0;flex-shrink:0;}
.month-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px 7px;transition:color .15s;line-height:1;}
.month-btn:hover:not(:disabled){color:var(--ow);}
.month-btn:disabled{opacity:0.25;cursor:default;}
.month-label{font-size:11px;background:var(--green);color:#fff;border-radius:4px;padding:3px 10px;font-weight:500;min-width:58px;text-align:center;}

.page{display:none;padding:1.5rem;max-width:1200px;margin:0 auto;}
.page.active{display:block;}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.25rem;}
.mc{background:var(--gray);border:1px solid var(--border);border-radius:8px;padding:1rem;}
.mc-label{font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;font-weight:300;}
.mc-value{font-size:20px;font-weight:500;color:var(--ow);}
.mc-note{font-size:11px;margin-top:4px;color:var(--muted);}
.mc-up .mc-value{color:var(--gl);}
.mc-up2 .mc-value{color:var(--gl2);}
.mc-warn .mc-value,.mc-warn .mc-note{color:var(--warn);}
.mc-down .mc-value,.mc-down .mc-note{color:var(--danger);}

.row2{display:grid;grid-template-columns:1.5fr 1fr;gap:12px;margin-bottom:12px;}
.row2e{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.row1{margin-bottom:12px;}

.card{background:var(--gray);border:1px solid var(--border);border-radius:8px;padding:1.1rem;}
.card-title{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#fff;margin-bottom:2px;}
.card-sub{font-size:11px;color:var(--muted);margin-bottom:.9rem;font-weight:300;}
.gbar{width:24px;height:3px;background:var(--green);border-radius:2px;margin-bottom:7px;}

.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.ld-line{width:14px;height:2px;border-radius:2px;flex-shrink:0;}

table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:5px 8px;color:var(--muted);font-weight:400;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.04em;}
th:not(:first-child){text-align:right;}
td{padding:6px 8px;color:var(--ow);border-bottom:1px solid rgba(255,255,255,0.04);}
td:not(:first-child){text-align:right;}
tr:last-child td{border-bottom:none;}
.tr-total td{color:var(--gl);font-weight:500;border-top:1px solid var(--green);}

.note{font-size:11px;color:var(--muted);border-left:2px solid var(--green);padding:5px 10px;margin-top:10px;line-height:1.5;}
.warn-note{font-size:11px;color:var(--warn);border-left:2px solid var(--warn);padding:5px 10px;margin-top:10px;line-height:1.5;}

.ctabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.ctab{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-family:'Ubuntu',sans-serif;transition:all .15s;}
.ctab:hover{color:var(--ow);}
.ctab.active{background:var(--green);color:#fff;border-color:var(--green);font-weight:500;}
.ctab-content{display:none;}
.ctab-content.active{display:block;}

.acc-group{border-bottom:1px solid rgba(255,255,255,0.04);}
.acc-header{display:flex;align-items:center;justify-content:space-between;padding:9px 8px;cursor:pointer;border-radius:4px;transition:background .12s;}
.acc-header:hover{background:rgba(255,255,255,0.04);}
.acc-left{display:flex;align-items:center;gap:8px;}
.acc-name{font-size:12px;font-weight:500;color:var(--ow);}
.acc-arrow{font-size:9px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.acc-arrow.open{transform:rotate(90deg);}
.acc-vals{display:flex;gap:16px;align-items:center;}
.acc-val{font-size:12px;text-align:right;min-width:72px;}
.acc-var{font-size:10px;padding:1px 7px;border-radius:99px;font-weight:500;min-width:44px;text-align:center;}
.v-pos{background:rgba(90,158,111,.2);color:var(--gl);}
.v-neg{background:rgba(248,113,113,.15);color:var(--danger);}
.v-neu{background:rgba(160,160,160,.15);color:var(--muted);}
.acc-body{display:none;padding:2px 0 4px 22px;}
.acc-body.open{display:block;}
.acc-sub{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:4px;}
.acc-sub:hover{background:rgba(255,255,255,0.03);}
.acc-sub-name{font-size:11px;color:var(--muted);}
.acc-sub-vals{display:flex;gap:16px;}
.acc-sub-val{font-size:11px;color:var(--muted);text-align:right;min-width:72px;}
.acc-col-heads{display:flex;justify-content:flex-end;gap:16px;padding:4px 8px;margin-bottom:2px;border-bottom:1px solid var(--border);}
.acc-col-head{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;min-width:72px;text-align:right;}
.acc-col-head:last-child{min-width:44px;text-align:center;}

.diff{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;font-weight:500;}
.diff-pos{background:rgba(90,158,111,.2);color:var(--gl);}
.diff-neg{background:rgba(248,113,113,.15);color:var(--danger);}

.pace-section{background:var(--gray);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.pace-header{padding:1rem 1.1rem .75rem;}
.pace-body{padding:0 1.1rem 1rem;}
.banker-row{margin-bottom:.9rem;}
.banker-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;flex-wrap:wrap;gap:4px;}
.banker-name{font-size:12px;font-weight:500;color:var(--ow);}
.banker-vals{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.bv{font-size:11px;color:var(--muted);}
.bv strong{color:var(--ow);font-weight:500;}
.pace-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;}
.p-ok  {background:rgba(90,158,111,.2); color:var(--gl);}
.p-warn{background:rgba(240,180,41,.18);color:var(--warn);}
.p-low {background:rgba(248,113,113,.15);color:var(--danger);}
.bar-outer{position:relative;height:22px;margin-bottom:3px;}
.bar-track{height:100%;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;display:flex;}
.seg-jan{height:100%;background:var(--gl);}
.seg-fev{height:100%;background:var(--green);border-radius:0 6px 6px 0;}
.marker{position:absolute;top:-3px;height:calc(100% + 6px);width:2px;border-radius:2px;}
.m-pace{background:var(--warn);}
.m-meta{background:rgba(255,255,255,0.18);}
.m-label{position:absolute;top:-17px;font-size:9px;white-space:nowrap;transform:translateX(-50%);font-weight:500;}
.bar-sub{display:flex;justify-content:space-between;margin-top:2px;}
.bar-pct{font-size:10px;color:var(--muted);}
.pace-divider{height:1px;background:var(--border);margin:.75rem 0;}
.total-block{background:rgba(61,117,78,0.1);border:1px solid rgba(61,117,78,0.22);border-radius:6px;padding:.85rem 1rem;}
.total-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;flex-wrap:wrap;gap:6px;}
.total-bar-outer{position:relative;height:12px;}
.total-track{height:100%;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;display:flex;}
.total-sub{display:flex;justify-content:space-between;margin-top:4px;}

.drill-divider{display:flex;align-items:center;gap:10px;margin:12px 0 10px;opacity:0;transition:opacity .25s;}
.drill-divider.visible{opacity:1;}
.drill-line{flex:1;height:1px;background:rgba(255,255,255,0.1);}
.drill-label{font-size:11px;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:6px;}
.drill-pill{font-size:11px;font-weight:500;padding:2px 10px;border-radius:4px;color:#fff;}
.bottom-wrap{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.bottom-wrap.open{max-height:320px;}
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-top:4px;}
.bottom-chart{position:relative;width:100%;height:230px;}
.hint{font-size:11px;color:var(--gl);margin-bottom:.85rem;}

.mini-tbl table{width:100%;border-collapse:collapse;font-size:11px;}
.mini-tbl th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:400;padding:4px 6px;border-bottom:1px solid var(--border);text-align:right;}
.mini-tbl th:first-child{text-align:left;}
.mini-tbl td{padding:5px 6px;color:var(--ow);border-bottom:1px solid rgba(255,255,255,0.04);text-align:right;}
.mini-tbl td:first-child{text-align:left;color:var(--muted);}
.mini-tbl tr:last-child td{border-bottom:none;}
.mini-tbl .tr-tot td{color:var(--gl);font-weight:500;border-top:1px solid var(--green);}
.zero{color:#3d3d3e !important;}

.prog-wrap{margin-bottom:10px;}
.prog-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.prog-name{font-size:12px;color:var(--ow);font-weight:500;}
.prog-val{font-size:11px;color:var(--muted);}
.prog-bar{background:var(--gray2);border-radius:4px;height:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;background:var(--green);}
.prog-fill.low{background:var(--danger);}
.prog-fill.mid{background:var(--warn);}

@media(max-width:700px){
  .row2,.row2e{grid-template-columns:1fr;}
  .metrics{grid-template-columns:repeat(2,1fr);}
  .acc-vals{display:none;}
  .bottom-grid{grid-template-columns:1fr;}
}
</style>
</head>

// ===================== CHART REGISTRY =====================
const charts={};
function mkChart(id,cfg){if(charts[id]){charts[id].destroy();}charts[id]=new Chart(document.getElementById(id),cfg);}

// ===================== RENDER =====================
function render(){
  const d=D[curM];
  document.getElementById('monthLabel').textContent=d.label;
  document.getElementById('btnPrev').disabled=(curM===0);
  document.getElementById('btnNext').disabled=(curM===MONTHS.length-1);
  renderVisao(d);
  renderReceita(d);
  renderCustos(d);
  renderCaptacao(d);
  renderBankers(d);
}

    <div class="card">
      <div class="gbar"></div><div class="card-title">AUM — Realizado vs Orçado</div>
      <div class="card-sub">R$ MM</div>
      <div class="legend"><span class="li"><span class="ld" style="background:#3D754E;"></span>Realizado</span><span class="li"><span class="ld" style="background:rgba(240,180,41,0.35);border:1px solid #f0b429;"></span>Orçado</span></div>
      <div style="position:relative;width:100%;height:220px;"><canvas id="aumOrcChart"></canvas></div>
      <div class="note">${v.aumOrc.noteText}</div>

// ---- RECEITA ----
function renderReceita(d){
  const r=d.receita;
  const augeAtivas=r.auge.linhas.filter(l=>Object.values(l.jan).reduce((a,b)=>a+b,0)+Object.values(l.fev).reduce((a,b)=>a+b,0)>0);
  const totJ=l=>Object.values(l.jan).reduce((a,b)=>a+b,0);
  const totF=l=>Object.values(l.fev).reduce((a,b)=>a+b,0);
  const augeLabels=[...augeAtivas.map(l=>l.nome),'Total'];
  const augeJan=[...augeAtivas.map(totJ),augeAtivas.reduce((s,l)=>s+totJ(l),0)];
  const augeFev=[...augeAtivas.map(totF),augeAtivas.reduce((s,l)=>s+totF(l),0)];
  const augeCors=[...augeAtivas.map(l=>l.cor),'#5a9e6f'];

  document.getElementById('page-receita').innerHTML=`
  <div class="metrics">${r.metrics.map(m=>`<div class="mc ${m.cls}"><div class="mc-label">${m.label}</div><div class="mc-value">${m.value}</div><div class="mc-note">${m.note}</div></div>`).join('')}</div>
  <div class="card row1" style="border-left:3px solid var(--info);border-radius:8px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <div class="gbar" style="background:var(--info);margin:0;flex-shrink:0;"></div>
      <span class="card-title" style="margin:0;color:var(--info);">Receita por Dia Útil — análise de crescimento real</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;">
      <div style="background:var(--gray2);border-radius:6px;padding:.75rem;">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;">${r.du.prev.label}</div>
        <div style="font-size:18px;font-weight:500;">${r.du.prev.val}</div>
        <div style="font-size:11px;color:var(--muted);">${r.du.prev.sub}</div>
      </div>
      <div style="background:var(--gray2);border-radius:6px;padding:.75rem;">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;">${r.du.cur.label}</div>
        <div style="font-size:18px;font-weight:500;color:var(--gl);">${r.du.cur.val}</div>
        <div style="font-size:11px;color:var(--gl);">${r.du.cur.delta}</div>
      </div>
      <div style="background:var(--gray2);border-radius:6px;padding:.75rem;">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;">Interpretação</div>
        <div style="font-size:12px;font-weight:500;color:var(--gl);line-height:1.5;">${r.du.info}</div>
      </div>
    </div>
  </div>
  <div class="row2e">
    <div class="card">
      <div class="gbar"></div><div class="card-title">RTS — Consultoria e Rec. Financeira</div>
      <div class="card-sub">DU é análise separada, não soma aqui</div>
      <div class="legend"><span class="li"><span class="ld" style="background:#3D754E;"></span>Consultoria</span><span class="li"><span class="ld" style="background:#60a5fa;"></span>Rec. Financeira</span></div>
      <div style="position:relative;width:100%;height:210px;"><canvas id="recRtsChart"></canvas></div>
    </div>
    <div class="card">
      <div class="gbar"></div><div class="card-title">AUGE — Cross-sell por linha de negócio</div>
      <div class="card-sub">${r.auge.prevLabel} e ${r.auge.curLabel}</div>
      <div class="hint">↓ Clique em uma linha para ver breakdown por banker</div>
      <div class="legend">
        <span class="li"><span class="ld" style="background:rgba(61,117,78,0.45);"></span>${r.auge.prevLabel}</span>
        <span class="li"><span class="ld" style="background:#f0b429;"></span>${r.auge.curLabel}</span>
      </div>
      <div style="position:relative;width:100%;height:170px;"><canvas id="augeTop"></canvas></div>
      <div class="drill-divider" id="augeDivider"><div class="drill-line"></div><div class="drill-label">Breakdown: <span class="drill-pill" id="augePill">—</span></div><div class="drill-line"></div></div>
      <div class="bottom-wrap" id="augeBotWrap"><div class="bottom-grid"><div style="position:relative;width:100%;height:200px;"><canvas id="augeBot"></canvas></div><div class="mini-tbl" id="augeMiniTable"></div></div></div>
    </div>
  </div>
  <div class="card row1">
    <div class="gbar"></div><div class="card-title">Receita por Banker — ${d.label}</div>
    <div class="card-sub">Detalhado por linha de produto</div>
    <div class="ctabs">
      <button class="ctab active" onclick="showCtab('rec','all',this)">Todos</button>
      <button class="ctab" onclick="showCtab('rec','mj',this)">MJ</button>
      <button class="ctab" onclick="showCtab('rec','dn',this)">DN</button>
      <button class="ctab" onclick="showCtab('rec','ri',this)">RI</button>
      <button class="ctab" onclick="showCtab('rec','nc',this)">NC</button>
    </div>
    <div id="rec-all" class="ctab-content active">
      <table><thead><tr><th>Banker</th><th>Consultoria</th><th>Cons. DU</th><th>Cross-sell</th><th>Total ${d.label}</th><th>vs mês ant.</th></tr></thead>
      <tbody>${r.bankerAll.map(row=>`<tr${row.tot?' class="tr-total"':''}><td>${row.bk}</td><td>${row.consult}</td><td>${row.du}</td><td>${row.cross}</td><td>${row.total}</td><td><span class="diff diff-${row.vc}">${row.var}</span></td></tr>`).join('')}</tbody></table>
    </div>
    ${['mj','dn','ri','nc'].map(bk=>`<div id="rec-${bk}" class="ctab-content">
      <table><thead><tr>${r.tabHeaders.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${r.tabBankers[bk].rows.map((row,i,arr)=>`<tr${i===arr.length-1?' class="tr-total"':''}>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>
    </div>`).join('')}
  </div>`;

  // Charts
  mkChart('recRtsChart',{type:'bar',data:{labels:r.recRts.labels,datasets:[
    {label:'Consultoria',data:r.recRts.consult,backgroundColor:'#3D754E',borderRadius:3},
    {label:'Rec. Financeira',data:r.recRts.fin,backgroundColor:'#60a5fa',borderRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,grid:{display:false},ticks:{color:lc,font:{size:11}}},y:{stacked:true,grid:{color:gc},ticks:{color:lc,font:{size:10},callback:v=>'R$'+Math.round(v/1000)+'K'}}}}});

  let augeTopChart,augeBotChart=null,augeCurrentLinha=null;
  augeTopChart=new Chart(document.getElementById('augeTop'),{type:'bar',data:{labels:augeLabels,datasets:[
    {label:r.auge.prevLabel,data:augeJan,backgroundColor:'rgba(61,117,78,0.45)',borderRadius:3},
    {label:r.auge.curLabel, data:augeFev,backgroundColor:augeCors,borderRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,
    onClick(evt,els){if(!els.length)return;const i=els[0].index;if(i<augeAtivas.length)openAugeDrill(augeAtivas[i]);},
    plugins:{legend:{display:false},tooltip:{callbacks:{footer:()=>['Clique para ver por banker']}}},
    scales:{x:{grid:{display:false},ticks:{color:'#F9F5EF',font:{size:9},maxRotation:25}},y:{grid:{color:gc},ticks:{color:lc,font:{size:10},callback:v=>v>=1000?'R$'+(v/1000).toFixed(1)+'K':'R$'+v}}}}});

  function openAugeDrill(linha){
    if(augeCurrentLinha===linha.nome){
      document.getElementById('augeBotWrap').classList.remove('open');
      document.getElementById('augeDivider').classList.remove('visible');
      augeCurrentLinha=null;
      augeTopChart.data.datasets[1].backgroundColor=augeCors;augeTopChart.update();return;
    }
    augeCurrentLinha=linha.nome;
    augeTopChart.data.datasets[1].backgroundColor=augeLabels.map((l,i)=>i<augeAtivas.length?(l===linha.nome?augeCors[i]:'rgba(100,100,100,0.25)'):augeCors[i]);
    augeTopChart.update();
    const pill=document.getElementById('augePill');pill.textContent=linha.nome;pill.style.background=linha.cor;
    pill.style.color=['#f0b429','#a3d9b1','#fb923c'].includes(linha.cor)?'#1A1A1B':'#fff';
    document.getElementById('augeDivider').classList.add('visible');
    const bankers=Object.keys(linha.jan);
    const jv=bankers.map(b=>linha.jan[b]||0),fv=bankers.map(b=>linha.fev[b]||0);
    if(augeBotChart){augeBotChart.destroy();augeBotChart=null;}
    augeBotChart=new Chart(document.getElementById('augeBot'),{type:'bar',data:{labels:bankers,datasets:[
      {label:r.auge.prevLabel,data:jv,backgroundColor:'rgba(61,117,78,0.45)',borderRadius:3},
      {label:r.auge.curLabel, data:fv,backgroundColor:linha.cor,borderRadius:3}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},color:lc,boxWidth:9,padding:8}}},
      scales:{x:{grid:{display:false},ticks:{color:'#F9F5EF',font:{size:11}}},y:{grid:{color:gc},ticks:{color:lc,font:{size:10},callback:v=>v>=1000?'R$'+(v/1000).toFixed(2)+'K':'R$'+Math.round(v)}}}}});
    const fmt=v=>v>0?(v>=1000?'R$'+(v/1000).toFixed(2)+'K':'R$'+Math.round(v)):'<span style="color:#3d3d3e">—</span>';
    const tj=jv.reduce((a,b)=>a+b,0),tf=fv.reduce((a,b)=>a+b,0);
    document.getElementById('augeMiniTable').innerHTML=`<table><thead><tr><th>Banker</th><th>${r.auge.prevLabel}</th><th>${r.auge.curLabel}</th><th>Var.</th></tr></thead><tbody>
      ${bankers.map((b,i)=>{const j=jv[i],f=fv[i];const vp=j>0?((f-j)/j*100).toFixed(0)+'%':f>0?'novo':'—';const vc=f>j?'#5a9e6f':f<j?'#f87171':'#6b7280';
      return`<tr><td style="color:var(--muted)">${b}</td><td>${fmt(j)}</td><td>${fmt(f)}</td><td style="color:${vc};font-size:10px">${vp}</td></tr>`}).join('')}
      <tr class="tr-tot"><td>Total</td><td>${fmt(tj)}</td><td>${fmt(tf)}</td><td style="color:${tf>tj?'#5a9e6f':'#f87171'};font-size:10px">${tj>0?((tf-tj)/tj*100).toFixed(0)+'%':'—'}</td></tr>
      </tbody></table>`;
    document.getElementById('augeBotWrap').classList.add('open');
  }
}

            <span style="font-size:11px;color:var(--muted);">Jan: <strong style="color:#5a9e6f;">R$${(c.total.jan/1e6).toFixed(1)}MM</strong></span>
            ${curM>0?`<span style="font-size:11px;color:var(--muted);">Fev: <strong style="color:var(--green);">R$${(c.total.fev/1e6).toFixed(1)}MM</strong></span>`:''}
            <span style="font-size:11px;color:var(--muted);">YTD: <strong style="color:#5a9e6f;">R$${(c.total.ytd/1e6).toFixed(1)}MM</strong></span>
            <span class="pace-badge p-warn">${c.total.badgeTxt}</span>
          </div>
        </div>
        <div class="total-bar-outer">
          <div class="total-track">
            <div style="height:100%;background:#5a9e6f;width:${(c.total.jan/1e9*100).toFixed(2)}%;border-radius:6px 0 0 6px;"></div>
            ${curM>0?`<div style="height:100%;background:#3D754E;width:${(c.total.fev/1e9*100).toFixed(2)}%;border-radius:0 4px 4px 0;"></div>`:''}
          </div>
          <div class="marker m-pace" style="left:${paceEsp.toFixed(1)}%;top:-3px;height:calc(100% + 6px);"></div>
          <div class="marker m-meta" style="left:99.5%;top:-3px;height:calc(100% + 6px);"></div>
        </div>
        <div class="total-sub">
          <span style="font-size:10px;color:var(--gl);">${(c.total.ytd/4e8*100).toFixed(1)}% da meta anual concluído</span>
          <span style="font-size:10px;color:var(--warn);">Pace esperado: ${paceEsp.toFixed(1)}% · Gap: R$${((4e8-c.total.ytd)/1e6).toFixed(1)}MM</span>
        </div>
      </div>
    </div>
  </div>
  <div class="card row1">
    <div class="gbar"></div><div class="card-title">Progresso vs Meta Anual</div>
    <div class="card-sub">R$100MM por banker · YTD · ritmo esperado: ${paceEsp.toFixed(1)}%</div>
    <div style="margin-top:.75rem;">
      ${c.prog.map(p=>`<div class="prog-wrap"><div class="prog-label"><span class="prog-name"${p.tot?' style="color:var(--gl);"':''}>${p.name}</span><span class="prog-val"${p.tot?' style="color:var(--gl);"':''}>${p.val}</span></div><div class="prog-bar"><div class="prog-fill ${p.cls}" style="width:${p.pct}%"></div></div></div>`).join('')}
    </div>
    <div class="note">${c.note}</div>
  </div>`;
}

// ---- BANKERS ----
function renderBankers(d){
  const b=d.bankers;
  const l=b.l3m;
  const bankers=['DN','MJ','NC','RI'];
  document.getElementById('page-bankers').innerHTML=`
  <div class="metrics">${b.metrics.map(m=>`<div class="mc ${m.cls}"><div class="mc-label">${m.label}</div><div class="mc-value">${m.value}</div><div class="mc-note">${m.note}</div></div>`).join('')}</div>
  <div class="row2e">
    <div class="card"><div class="gbar"></div><div class="card-title">AUM por Banker — ${d.label}</div><div class="card-sub">Custódia sob assessoria (R$ MM)</div>
      <div style="position:relative;width:100%;height:210px;"><canvas id="aumBankerChart"></canvas></div>
    </div>
    <div class="card"><div class="gbar"></div><div class="card-title">ROA Consultoria por Banker</div><div class="card-sub">${b.roaBanker.prevLabel} vs ${b.roaBanker.curLabel}</div>
      <div style="position:relative;width:100%;height:210px;"><canvas id="roaBankerChart"></canvas></div>
      <div class="warn-note">⚠ ROA NC caiu — impacto IDB.</div>
    </div>
  </div>
  <div class="card row1">
    <div class="gbar"></div><div class="card-title">Receita Banker — L3M + Breakdown por linha</div>
    <div class="card-sub">${l.labels.join(', ')} · clique em um banker para ver detalhamento</div>
    <div class="hint">↓ Clique em qualquer barra para expandir o detalhamento por linha</div>
    <div class="legend">
      <span class="li"><span class="ld" style="background:rgba(61,117,78,0.2);border:1px solid #3D754E;"></span>Dez/25</span>
      ${l.labels.map((lbl,i)=>i>0?`<span class="li"><span class="ld" style="background:rgba(61,117,78,${0.3+i*0.25});"></span>${lbl}</span>`:''  ).join('')}
    </div>
    <div style="position:relative;width:100%;height:200px;"><canvas id="l3mTop"></canvas></div>
    <div class="drill-divider" id="l3mDivider"><div class="drill-line"></div><div class="drill-label">Detalhamento: <span class="drill-pill" id="l3mPill">—</span></div><div class="drill-line"></div></div>
    <div class="bottom-wrap" id="l3mBotWrap">
      <div class="legend" id="l3mLegend" style="margin-bottom:8px;"></div>
      <div class="bottom-grid"><div style="position:relative;width:100%;height:220px;"><canvas id="l3mBot"></canvas></div><div class="mini-tbl" id="l3mMiniTable"></div></div>
    </div>
  </div>
  <div class="card row1">
    <div class="gbar"></div><div class="card-title">Clientes e Receita média por Cliente — ${d.label}</div>
    <table><thead><tr><th>Banker</th><th>Clientes</th><th>AUM (MM)</th><th>Rec/Cliente</th><th>ROA</th></tr></thead>
    <tbody>${b.clientTable.map(row=>`<tr${row.tot?' class="tr-total"':''}><td>${row.bk}</td><td>${row.cli}</td><td>${row.aum}</td><td>${row.rpc}</td><td>${row.roa}</td></tr>`).join('')}</tbody></table>
    <div class="note">${b.clientNote}</div>
  </div>`;

  mkChart('aumBankerChart',{type:'bar',data:{labels:b.aumBanker.labels,datasets:[{data:b.aumBanker.data,backgroundColor:['#3D754E','#5a9e6f','#3D754E','#5a9e6f'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:lc,font:{size:11}}},y:{min:80,grid:{color:gc},ticks:{color:lc,font:{size:10},callback:v=>'R$'+v+'MM'}}}}});
  mkChart('roaBankerChart',{type:'bar',data:{labels:b.roaBanker.labels,datasets:[
    {label:b.roaBanker.prevLabel,data:b.roaBanker.prev,backgroundColor:'rgba(61,117,78,0.4)',borderRadius:3},
    {label:b.roaBanker.curLabel, data:b.roaBanker.cur, backgroundColor:'#3D754E',borderRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},color:lc,boxWidth:9,padding:8}}},scales:{x:{grid:{display:false},ticks:{color:lc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:lc,font:{size:10},callback:v=>v.toFixed(2)+'%'}}}}});

  // L3M
  const l3mDatasets=[
    {label:'Dez/25',data:bankers.map(bk=>l.bkTotals[bk].dez),backgroundColor:'rgba(61,117,78,0.2)',borderRadius:3,borderWidth:1,borderColor:'#3D754E'},
    {label:l.labels[0],data:bankers.map(bk=>l.bkTotals[bk].jan),backgroundColor:'rgba(61,117,78,0.55)',borderRadius:3}
  ];
  if(l.labels[1]) l3mDatasets.push({label:l.labels[1],data:bankers.map(bk=>l.bkTotals[bk].fev),backgroundColor:bankers.map(bk=>l.bkColors[bk]),borderRadius:3});

  let l3mBotChart=null,l3mCurrent=null;
  const l3mTop=new Chart(document.getElementById('l3mTop'),{type:'bar',data:{labels:bankers,datasets:l3mDatasets},
    options:{responsive:true,maintainAspectRatio:false,
      onClick(evt,els){if(!els.length)return;openL3mDrill(bankers[els[0].index]);},
      plugins:{legend:{display:false},tooltip:{callbacks:{footer:()=>['Clique para ver breakdown por linha']}}},
      scales:{x:{grid:{display:false},ticks:{color:'#F9F5EF',font:{size:12,weight:'500'}}},y:{grid:{color:gc},ticks:{color:lc,font:{size:10},callback:v=>'R$'+Math.round(v/1000)+'K'}}}}});

  function openL3mDrill(banker){
    if(l3mCurrent===banker){
      document.getElementById('l3mBotWrap').classList.remove('open');
      document.getElementById('l3mDivider').classList.remove('visible');
      l3mCurrent=null;
      if(l.labels[1]) l3mTop.data.datasets[2].backgroundColor=bankers.map(bk=>l.bkColors[bk]);
      l3mTop.update();return;
    }
    l3mCurrent=banker;
    if(l.labels[1]) l3mTop.data.datasets[2].backgroundColor=bankers.map(bk=>bk===banker?l.bkColors[bk]:'rgba(61,117,78,0.2)');
    l3mTop.update();
    const pill=document.getElementById('l3mPill');pill.textContent=banker;pill.style.background=l.bkColors[banker];
    pill.style.color=['#a3d9b1','#5a9e6f'].includes(l.bkColors[banker])?'#1A1A1B':'#fff';
    document.getElementById('l3mDivider').classList.add('visible');
    const bkd=l.bkBreak[banker];
    document.getElementById('l3mLegend').innerHTML=bkd.labels.map((lb,i)=>`<span class="li"><span class="ld" style="background:${bkd.colors[i]};"></span>${lb}</span>`).join('');
    if(l3mBotChart){l3mBotChart.destroy();l3mBotChart=null;}
    const hasF=l.labels[1];
    l3mBotChart=new Chart(document.getElementById('l3mBot'),{type:'bar',
      data:{labels:hasF?['Dez/25',l.labels[0],l.labels[1]]:['Dez/25',l.labels[0]],
            datasets:bkd.labels.map((label,i)=>({label,data:hasF?[bkd.dez[i],bkd.jan[i],bkd.fev[i]]:[bkd.dez[i],bkd.jan[i]],backgroundColor:bkd.colors[i],borderRadius:3}))},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:lc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:lc,font:{size:10},callback:v=>'R$'+Math.round(v/1000)+'K'}}}}});
    const fmt2=v=>(v&&v>0)?'R$'+(v>=1000?(v/1000).toFixed(1)+'K':Math.round(v)):'<span style="color:#3d3d3e">—</span>';
    const tot=l.bkTotals[banker];
    document.getElementById('l3mMiniTable').innerHTML=`<table><thead><tr><th>Linha</th><th>Dez</th><th>${l.labels[0]}</th>${hasF?`<th>${l.labels[1]}</th>`:''}</tr></thead>
      <tbody>${bkd.labels.map((lb,i)=>`<tr><td style="color:var(--muted);display:flex;align-items:center;gap:5px;"><span style="width:8px;height:8px;border-radius:2px;background:${bkd.colors[i]};flex-shrink:0;display:inline-block;"></span>${lb}</td><td>${fmt2(bkd.dez[i])}</td><td>${fmt2(bkd.jan[i])}</td>${hasF?`<td>${fmt2(bkd.fev[i])}</td>`:''}</tr>`).join('')}
      <tr class="tr-tot"><td>Total</td><td>${fmt2(tot.dez)}</td><td>${fmt2(tot.jan)}</td>${hasF?`<td>${fmt2(tot.fev)}</td>`:''}</tr>
      </tbody></table>`;
    document.getElementById('l3mBotWrap').classList.add('open');
  }
}

// ===================== NAV =====================
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}
function showCtab(group,id,btn){
  const card=btn.closest('.card');
  card.querySelectorAll('.ctab-content').forEach(el=>el.classList.remove('active'));
  card.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));
  document.getElementById(group+'-'+id).classList.add('active');
  btn.classList.add('active');
}
function toggleAcc(id){
  document.getElementById('body-'+id).classList.toggle('open');
  document.getElementById('arr-'+id).classList.toggle('open');
}
function changeMonth(dir){
  const n=curM+dir;
  if(n<0||n>=MONTHS.length)return;
  curM=n;
  render();
}

render();
</script>
</body>
</html>
